<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c12" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Elliott-Report</title>
  <style>
    /* Palette + Stilmittel abgelesen aus easywebb911/Aktien-Update (app.html):
       dunkle :root-Variablen, Card mit hell-oben→dunkel-unten-Sheen,
       metric-box-Kacheln, Mono-Ticker, tabular-nums, uppercase Micro-Labels,
       Sparkline mit vertikalem Gradient-Fill + Endpunkt-Marker. */
    :root {
      --bg:#0a0c12; --bg-card:#141929; --bg-hdr:#0d1117; --bg-met:#1a2035;
      --txt:#e2e8f0; --txt-sub:#94a3b8; --txt-dim:#64748b;
      --brd:#1e2d4a; --shadow:0 2px 12px rgba(0,0,0,.35);
      --accent:#3b82f6; --radius:14px;
      --red:#ef4444; --ora:#f59e0b; --grn:#22c55e; --disc:#ca8a04;
      /* Sparkline: dunkelgrün */
      --spark:#15803d; --spark-fill:#22c55e; --spark-end:#22c55e;
      --mono:'SF Mono','SFMono-Regular',ui-monospace,'Courier New',monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; background:var(--bg); color:var(--txt);
      font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      -webkit-text-size-adjust:100%;
    }
    header {
      padding:18px 16px 12px; border-bottom:1px solid var(--brd);
      position:sticky; top:0; background:var(--bg-hdr); z-index:10;
    }
    .head-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    h1 { margin:0; font-size:20px; font-weight:800; letter-spacing:.3px; }
    .sub { color:var(--txt-sub); font-size:12px; margin-top:4px; font-variant-numeric:tabular-nums; }
    .reload {
      flex:0 0 auto; -webkit-appearance:none; appearance:none; cursor:pointer;
      background:var(--bg-met); color:var(--txt); border:1px solid var(--brd);
      border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600;
      min-height:40px; touch-action:manipulation;
    }
    .reload:active { background:var(--bg-hdr); }
    .reload[disabled] { opacity:.5; cursor:default; }

    main { max-width:900px; margin:0 auto; padding:16px; }
    .banner {
      display:none; margin:12px 0; padding:10px 12px; border-radius:8px;
      background:rgba(245,158,11,.12); border:1px solid var(--ora);
      color:var(--ora); font-size:13px;
    }
    .banner.show { display:block; }
    h2 {
      font-size:12px; text-transform:uppercase; letter-spacing:.12em;
      color:var(--txt-sub); font-weight:700; margin:22px 0 10px;
      display:flex; align-items:center; gap:8px;
    }
    h2::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--brd),transparent); }

    .grid { display:grid; gap:10px; grid-template-columns:1fr; }
    @media (min-width:620px) { .grid { grid-template-columns:1fr 1fr; } }

    .card {
      background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(0,0,0,.10) 100%) var(--bg-card);
      border:1px solid var(--brd); border-radius:var(--radius);
      box-shadow:var(--shadow); overflow:hidden;
    }
    /* Header nach Squeeze-Vorbild (app.html): Rang-Kreis, Mono-Ticker,
       Chart-Button, Firmenname, Sektor-Zeile, rechts großer Kurs + Änderung. */
    .card-top {
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:10px; padding:12px 12px 8px;
    }
    .card-left { display:flex; align-items:flex-start; gap:10px; min-width:0; flex:1; }
    .rank {
      flex:0 0 auto; display:flex; align-items:center; justify-content:center;
      width:26px; height:26px; border-radius:50%; background:var(--accent); color:#fff;
      font-size:.72rem; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px;
    }
    .hdr-block { min-width:0; flex:1; }
    .ticker-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .ticker {
      font-family:var(--mono); font-size:1.2rem; font-weight:800; color:var(--txt);
      letter-spacing:.01em;
    }
    .chart-btn {
      display:inline-flex; align-items:center; gap:4px; text-decoration:none;
      font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
      color:var(--txt-sub); background:var(--bg-met); border:1px solid var(--brd);
      border-radius:6px; padding:2px 6px; min-height:22px; touch-action:manipulation;
    }
    .chart-btn:active { background:var(--bg-hdr); }
    .chart-btn svg { width:11px; height:11px; flex-shrink:0; }
    .company {
      color:var(--txt-sub); font-size:.74rem; margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .sector-tag {
      color:var(--txt-dim); font-size:.64rem; margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-right { flex:0 0 auto; text-align:right; }
    .cockpit-price {
      font-size:1.35rem; font-weight:800; color:var(--txt);
      font-variant-numeric:tabular-nums; line-height:1.1;
    }
    .chg {
      display:block; font-size:.68rem; font-weight:700;
      font-variant-numeric:tabular-nums; margin-top:2px; white-space:nowrap;
    }
    .chg-up { color:var(--grn); } .chg-down { color:var(--red); } .chg-flat { color:var(--txt-dim); }
    .score-mini {
      font-size:.72rem; font-weight:700; color:var(--accent);
      font-variant-numeric:tabular-nums; margin-top:4px;
    }
    /* Live-Quote-Indikator (portiert aus dem Squeeze-Poller). Standard grau;
       live = pulsierendes Grün, stale = statisches Grau, paused = gedimmt. */
    .live-row { display:flex; align-items:center; justify-content:flex-end; gap:5px; margin-top:5px; min-height:12px; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#475569; flex-shrink:0; }
    .live-dot.live-on { background:var(--grn); box-shadow:0 0 6px rgba(34,197,94,.55); animation:livePulse 2s ease-in-out infinite; }
    .live-dot.live-stale { background:var(--txt-dim); box-shadow:none; animation:none; }
    .live-dot.live-paused { background:var(--grn); opacity:.4; box-shadow:none; animation:none; }
    .live-time { font-size:.56rem; color:var(--txt-dim); font-variant-numeric:tabular-nums; }
    @keyframes livePulse { 0%,100% { box-shadow:0 0 6px rgba(34,197,94,.55); } 50% { box-shadow:0 0 2px rgba(34,197,94,.25); } }
    @media (prefers-reduced-motion: reduce) { .live-dot.live-on { animation:none; } }
    .setup { color:var(--txt); font-size:.78rem; padding:0 12px 8px; line-height:1.35; }

    .metrics-row { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; padding:0 12px 12px; }
    .metric-box {
      background:linear-gradient(180deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.02) 100%) var(--bg-met);
      border:1px solid var(--brd); border-radius:10px; padding:8px 8px; text-align:center;
      min-width:0;
    }
    .m-val {
      display:block; font-size:1rem; font-weight:800; color:var(--txt);
      font-variant-numeric:tabular-nums; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .m-val.inval { color:var(--red); }
    .metric-box.zone .m-val { font-size:.82rem; }
    .m-lbl {
      display:block; font-size:.58rem; text-transform:uppercase; letter-spacing:.06em;
      color:var(--txt-dim); margin-top:3px;
    }

    .ext-zone {
      padding:0 12px 12px; margin-top:-6px;
      font-size:.66rem; color:var(--txt-dim); font-variant-numeric:tabular-nums;
    }
    .ext-zone .ext-lbl { text-transform:uppercase; letter-spacing:.08em; margin-right:5px; }
    .spark-wrap { padding:8px 12px 6px; border-top:1px solid var(--brd); }
    .spark-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
    .spark-title { font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--txt-dim); font-weight:700; }
    .spark-trend { font-size:12px; font-weight:700; }
    .spark-svg { width:100%; height:56px; }
    .spark-svg svg { width:100%; height:56px; display:block; overflow:visible; }
    .spark-empty { font-size:.7rem; color:var(--txt-dim); font-style:italic; padding:16px 0; text-align:center; }
    /* Sparkline-Animation: Linie zeichnet sich ein, Fill/Punkte blenden auf,
       Endpunkt-Marker poppt. Reduced-motion wird respektiert. */
    .spark-line { stroke-dasharray:1; stroke-dashoffset:1; animation:sparkDraw .9s ease forwards; }
    .spark-fill { opacity:0; animation:sparkFade .5s ease .45s forwards; }
    .spark-end  { opacity:0; transform-box:fill-box; transform-origin:center;
                  animation:sparkPop .35s cubic-bezier(.2,1.4,.4,1) .8s forwards; }
    @keyframes sparkDraw { to { stroke-dashoffset:0; } }
    @keyframes sparkFade { to { opacity:1; } }
    @keyframes sparkPop  { from { opacity:0; transform:scale(.2); } to { opacity:1; transform:scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      .spark-line { stroke-dasharray:none; stroke-dashoffset:0; animation:none; }
      .spark-fill { opacity:1; animation:none; }
      .spark-end  { opacity:1; transform:none; animation:none; }
    }

    .card-foot { padding:0 12px 12px; }
    .badge {
      display:inline-block; padding:3px 9px; border-radius:6px;
      font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      background:rgba(202,138,4,.14); color:var(--disc); border:1px solid rgba(202,138,4,.45);
    }

    .empty { color:var(--txt-sub); font-style:italic; padding:12px 0; }
    footer { color:var(--txt-dim); font-size:11px; text-align:center;
             padding:24px 16px; border-top:1px solid var(--brd); margin-top:24px; }
    .err { color:var(--red); }
    .toast {
      position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
      background:var(--bg-card); color:var(--txt); border:1px solid var(--grn);
      border-radius:999px; padding:8px 16px; font-size:13px;
      opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:20; max-width:90vw;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <header>
    <div class="head-row">
      <div>
        <h1>Elliott-Report</h1>
        <div class="sub" id="meta">lädt …</div>
      </div>
      <button class="reload" id="reload" type="button" aria-label="Neu laden">↻ Neu laden</button>
    </div>
  </header>
  <main>
    <div class="banner" id="staleness"></div>
    <section id="US"></section>
    <section id="DE"></section>
  </main>
  <footer>
    Heuristische Elliott-Wellen-Auszählung · unvalidiert · keine Anlageberatung.
  </footer>
  <div class="toast" id="toast"></div>

  <script>
    // WICHTIG (Pages-Pfad-Widerspruch): GitHub Pages wird aus /docs bedient,
    // Dateien AUSSERHALB /docs (z. B. das kanonische data/report.json im
    // Repo-Root) sind dort NICHT erreichbar. Deshalb spiegelt der Workflow den
    // Report nach docs/data/. Wir probieren mehrere Pfade, damit sowohl die
    // Live-Seite als auch lokale Vorschau (Server im Repo-Root) funktionieren.
    const CANDIDATE_PATHS = ['data/report.json', '../data/report.json'];
    const STALENESS_HOURS = 30;

    async function loadReport() {
      // Cache-Buster + no-store, damit iOS-Safari NICHT die alte Datei liefert
      // (kein Service Worker; der Reload muss wirklich frische Daten holen).
      const bust = '?t=' + Date.now();
      let lastErr = null;
      for (const path of CANDIDATE_PATHS) {
        try {
          const res = await fetch(path + bust, { cache: 'no-store' });
          if (res.ok) return await res.json();
          lastErr = new Error(path + ' → HTTP ' + res.status);
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('Report nicht gefunden');
    }

    function fmt(n) {
      if (n === null || n === undefined) return '–';
      return Number(n).toLocaleString('de-DE', { maximumFractionDigits: 2 });
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }

    // Sparkline wird NACH dem Render gezeichnet (misst die echte Pixelbreite,
    // damit Endpunkt-/Pivot-Marker rund bleiben statt verzerrt — Ansatz aus
    // dem Squeeze-Report). Stilmittel: vertikaler Gradient-Fill unter der
    // Kurve, weiche Linie, Endpunkt-Marker. Die Invalidierungs-Linie ist eine
    // Elliott-Ergänzung (nur wenn im Sichtbereich), nicht aus dem Vorbild.
    function drawSparkline(el) {
      let ys, inval;
      try { ys = JSON.parse(el.dataset.pts || '[]'); } catch (e) { ys = []; }
      inval = el.dataset.inval === '' ? null : parseFloat(el.dataset.inval);
      if (!ys || ys.length < 2) { el.innerHTML = '<div class="spark-empty">Kein Verlauf</div>'; return; }

      const W = Math.max(el.clientWidth || 280, 80), H = 56, PX = 3, PY = 7;
      const min = Math.min(...ys), max = Math.max(...ys), span = (max - min) || 1;
      const n = ys.length;
      const xOf = i => PX + (i / (n - 1)) * (W - 2 * PX);
      const yOf = v => H - PY - ((v - min) / span) * (H - 2 * PY);

      let area = `M${xOf(0).toFixed(1)},${yOf(ys[0]).toFixed(1)}`;
      let line = area;
      for (let i = 1; i < n; i++) {
        const x = xOf(i).toFixed(1), y = yOf(ys[i]).toFixed(1);
        area += `L${x},${y}`; line += `L${x},${y}`;
      }
      area += `L${xOf(n - 1).toFixed(1)},${(H - PY).toFixed(1)}L${xOf(0).toFixed(1)},${(H - PY).toFixed(1)}Z`;

      const id = 'sg' + Math.random().toString(36).slice(2, 8);
      let invLine = '';
      if (inval != null && !isNaN(inval) && inval >= min && inval <= max) {
        const iy = yOf(inval).toFixed(1);
        invLine = `<line x1="0" y1="${iy}" x2="${W}" y2="${iy}" stroke="var(--red)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>`;
      }
      let dots = '';
      for (let i = 0; i < n - 1; i++) {
        dots += `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(ys[i]).toFixed(1)}" r="1.6" fill="var(--spark)" opacity="0.55"/>`;
      }
      const ex = xOf(n - 1).toFixed(1), ey = yOf(ys[n - 1]).toFixed(1);

      el.innerHTML =
        `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--spark-fill)" stop-opacity="0.30"/>
            <stop offset="100%" stop-color="var(--spark-fill)" stop-opacity="0.03"/>
          </linearGradient></defs>
          ${invLine}
          <path class="spark-fill" d="${area}" fill="url(#${id})"/>
          <path class="spark-line" d="${line}" pathLength="1" fill="none" stroke="var(--spark)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <g class="spark-fill">${dots}</g>
          <circle class="spark-end" cx="${ex}" cy="${ey}" r="3.2" fill="var(--spark-end)" stroke="var(--bg-card)" stroke-width="1.6"/>
        </svg>`;
    }
    function drawAllSparklines() {
      document.querySelectorAll('.spark-svg').forEach(drawSparkline);
    }

    // Chart-Link-Muster wie im Squeeze-Vorbild (stockanalysis.com), für ALLE
    // Ticker (Easy-Entscheidung). US: /stocks/{lower}/ (verifiziert). .DE:
    // /quote/etr/{SYMBOL}/ — BEST-GUESS, aus der Sandbox nicht verifizierbar
    // (siehe PR-Text). Öffnet in neuem Tab.
    function chartUrl(ticker) {
      if (ticker.endsWith('.DE')) {
        return `https://stockanalysis.com/quote/etr/${encodeURIComponent(ticker.slice(0, -3))}/`;
      }
      return `https://stockanalysis.com/stocks/${encodeURIComponent(ticker.toLowerCase())}/`;
    }
    const CHART_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>';

    function changeHtml(c) {
      const p = c.change_pct, a = c.change_abs;
      if (p === null || p === undefined) return '';
      const cls = p > 0 ? 'chg-up' : p < 0 ? 'chg-down' : 'chg-flat';
      const arrow = p > 0 ? '▲' : p < 0 ? '▼' : '•';
      const sgn = p > 0 ? '+' : '';  // Minus liefert fmt() selbst (de-DE)
      return `<span class="chg ${cls}" data-quote="change">${arrow} ${sgn}${fmt(a)} (${sgn}${fmt(p)}%)</span>`;
    }

    function card(c, rank) {
      const ys = (c.chart_points || []).map(p => p.price);
      const trendUp = ys.length >= 2 ? ys[ys.length - 1] >= ys[0] : true;
      const zone = c.target_zone ? `${fmt(c.target_zone.low)}–${fmt(c.target_zone.high)}` : '–';
      const ez = c.target_zone_extended;
      // Easy-Entscheidung: Extension IMMER anzeigen (auch in den seltenen
      // W4-Fällen mit kurzer Netto-Strecke P0->P3, wo sie knapp unter der
      // Basiszone liegen kann). Konsequente Darstellung; Feld ist additiv.
      const extLine = ez
        ? `<div class="ext-zone"><span class="ext-lbl">Extension</span>${fmt(ez.low)}–${fmt(ez.high)}</div>`
        : '';
      const company = (c.company_name && c.company_name !== c.ticker)
        ? `<div class="company">${esc(c.company_name)}</div>` : '';
      const sector = c.sector ? `<div class="sector-tag">${esc(c.sector)}</div>` : '';
      return `<article class="card" data-ticker="${esc(c.ticker)}">
        <div class="card-top">
          <div class="card-left">
            <span class="rank">${rank}</span>
            <div class="hdr-block">
              <div class="ticker-row">
                <span class="ticker">${esc(c.ticker)}</span>
                <a class="chart-btn" href="${esc(chartUrl(c.ticker))}" target="_blank" rel="noopener noreferrer" title="Chart · stockanalysis.com">${CHART_ICON}<span>Chart</span></a>
              </div>
              ${company}
              ${sector}
            </div>
          </div>
          <div class="card-right">
            <div class="cockpit-price" data-quote="price">${fmt(c.close)}</div>
            ${changeHtml(c)}
            <div class="score-mini">Score ${fmt(c.score_heuristic)}</div>
            <div class="live-row">
              <span class="live-dot" data-quote="dot" title="Live-Quote wird geladen …"></span>
              <span class="live-time" data-quote="time"></span>
            </div>
          </div>
        </div>
        <div class="setup">${esc(c.count_label || '')}</div>
        <div class="metrics-row">
          <div class="metric-box"><span class="m-val inval">${fmt(c.invalidation_price)}</span><span class="m-lbl">Invalidierung</span></div>
          <div class="metric-box zone"><span class="m-val">${zone}</span><span class="m-lbl">Zielzone</span></div>
        </div>
        ${extLine}
        <div class="spark-wrap">
          <div class="spark-header">
            <span class="spark-title">Pivot-Verlauf</span>
            <span class="spark-trend" style="color:${trendUp ? 'var(--grn)' : 'var(--red)'}">${trendUp ? '▲' : '▼'}</span>
          </div>
          <div class="spark-svg" data-pts="${esc(JSON.stringify(ys))}" data-inval="${c.invalidation_price ?? ''}"></div>
        </div>
        <div class="card-foot">
          <span class="badge">${esc(c.status || 'heuristisch · unvalidiert')}</span>
        </div>
      </article>`;
    }

    function renderMarket(id, market) {
      const el = document.getElementById(id);
      const cards = (market.candidates || []).map((c, i) => card(c, i + 1)).join('');
      el.innerHTML = `<h2>${esc(market.label)}</h2>` +
        (cards ? `<div class="grid">${cards}</div>`
               : `<div class="empty">Keine validen Kandidaten für diesen Lauf.</div>`);
    }

    function checkStaleness(tsUtc) {
      const banner = document.getElementById('staleness');
      if (!tsUtc) return;
      const ageH = (Date.now() - new Date(tsUtc).getTime()) / 3.6e6;
      if (ageH > STALENESS_HOURS) {
        banner.textContent = `⚠️ Daten sind ${Math.round(ageH)} h alt ` +
          `(> ${STALENESS_HOURS} h) — Update ausstehend.`;
        banner.classList.add('show');
      }
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    async function refresh({ announce = false } = {}) {
      const btn = document.getElementById('reload');
      btn.disabled = true;
      const prev = btn.textContent;
      btn.textContent = '… lädt';
      try {
        const r = await loadReport();
        document.getElementById('meta').textContent =
          `Stand: ${r.run_timestamp_utc || '?'} · Schema v${r.schema_version ?? '?'}`;
        document.getElementById('staleness').classList.remove('show');
        checkStaleness(r.run_timestamp_utc);
        renderMarket('US', r.markets.US);
        renderMarket('DE', r.markets.DE);
        drawAllSparklines();
        startQuotePolls();  // Live-Quotes nach jedem (Re-)Render neu aufsetzen
        if (announce) showToast(`Aktualisiert · Stand ${r.run_timestamp_utc || '?'}`);
      } catch (e) {
        document.getElementById('meta').innerHTML =
          `<span class="err">Report konnte nicht geladen werden: ${esc(e.message)}</span>`;
        if (announce) showToast('Aktualisieren fehlgeschlagen');
      } finally {
        btn.textContent = prev;
        btn.disabled = false;
      }
    }

    // Sparklines bei Größenänderung neu zeichnen (Marker bleiben rund).
    let rzTimer = null;
    window.addEventListener('resize', () => {
      if (rzTimer) clearTimeout(rzTimer);
      rzTimer = setTimeout(drawAllSparklines, 150);
    });

    // ── Live-Quote-Polling (portiert aus easywebb911/aktien-update, app.html) ──
    // Cloudflare-Worker proxyt Yahoo v8; 15-s-Intervall; visibilitychange
    // pausiert im inaktiven Tab. WICHTIG (Squeeze-Lesson): Poller-Ziele über
    // data-quote-Attribute ankern, NICHT über Styling-Klassen — so bricht ein
    // CSS-Rename den Poller NICHT. Fail-soft: jeder Fehler -> Punkt grau,
    // Pipeline-Werte bleiben stehen, kein Retry-Sturm, keine Konsolen-Ausgabe.
    const QUOTE_PROXY_URL = 'https://quote-proxy.easywebb.workers.dev';
    const QUOTE_POLL_MS = 15000;
    const quotePollers = new Map();  // ticker -> intervalId
    let quoteVisHook = false;

    function quoteSetDot(card, state, timeStr) {
      const dot = card.querySelector('[data-quote="dot"]');
      if (dot) {
        dot.classList.remove('live-on', 'live-stale', 'live-paused');
        dot.classList.add(state === 'live' ? 'live-on' : state === 'paused' ? 'live-paused' : 'live-stale');
        dot.title = state === 'live' ? 'Live · alle 15 s'
                  : state === 'paused' ? 'Pausiert (Tab inaktiv)'
                  : 'Live-Quelle nicht erreichbar — zeigt Schlusskurs';
      }
      if (state === 'live' && timeStr) {
        const t = card.querySelector('[data-quote="time"]');
        if (t) t.textContent = 'Live · ' + timeStr;
      }
    }

    function quotePatch(card, q) {
      if (typeof q.price === 'number' && isFinite(q.price)) {
        const el = card.querySelector('[data-quote="price"]');
        if (el) el.textContent = fmt(q.price);
      }
      const p = q.change, a = q.change_abs;  // change == Tages-% (Worker-Vertrag)
      if (typeof p === 'number' && isFinite(p)) {
        const el = card.querySelector('[data-quote="change"]');
        if (el) {
          const cls = p > 0 ? 'chg-up' : p < 0 ? 'chg-down' : 'chg-flat';
          const arrow = p > 0 ? '▲' : p < 0 ? '▼' : '•';
          const sgn = p > 0 ? '+' : '';
          const abs = (typeof a === 'number' && isFinite(a)) ? a : (q.price * p / 100);
          el.className = 'chg ' + cls;  // data-quote bleibt (eigenes Attribut)
          el.textContent = `${arrow} ${sgn}${fmt(abs)} (${sgn}${fmt(p)}%)`;
        }
      }
    }

    async function quoteFetchOnce(card, ticker) {
      if (!QUOTE_PROXY_URL || !ticker) return;
      try {
        const res = await fetch(`${QUOTE_PROXY_URL}/?ticker=${encodeURIComponent(ticker)}`, { cache: 'no-store' });
        if (!res.ok) { quoteSetDot(card, 'stale'); return; }
        const q = await res.json();
        if (!q || q.error || q.ticker !== ticker) { quoteSetDot(card, 'stale'); return; }
        quotePatch(card, q);
        const hhmm = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        quoteSetDot(card, 'live', hhmm);
      } catch (_) {
        quoteSetDot(card, 'stale');  // fail-soft, kein console/Toast
      }
    }

    function stopAllQuotePolls() {
      quotePollers.forEach(id => clearInterval(id));
      quotePollers.clear();
    }

    function ensureQuoteVisHook() {
      if (quoteVisHook) return;
      quoteVisHook = true;
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          stopAllQuotePolls();
          document.querySelectorAll('.card[data-ticker]').forEach(c => quoteSetDot(c, 'paused'));
        } else {
          startQuotePolls();  // Resume: sofort-Fetch + neue Intervalle
        }
      });
    }

    function startQuotePolls() {
      if (!QUOTE_PROXY_URL) return;
      stopAllQuotePolls();
      ensureQuoteVisHook();
      const hidden = document.visibilityState === 'hidden';
      document.querySelectorAll('.card[data-ticker]').forEach(card => {
        const ticker = card.getAttribute('data-ticker');
        if (!ticker) return;
        quoteFetchOnce(card, ticker);  // sofortiger erster Fetch
        if (hidden) { quoteSetDot(card, 'paused'); return; }
        quotePollers.set(ticker, setInterval(() => quoteFetchOnce(card, ticker), QUOTE_POLL_MS));
      });
    }

    document.getElementById('reload').addEventListener('click', () => refresh({ announce: true }));
    refresh();
  </script>
</body>
</html>
