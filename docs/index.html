<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Elliott-Report</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --long: #3fb950; --short: #f85149; --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    header {
      padding: 20px 16px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    main { max-width: 900px; margin: 0 auto; padding: 16px; }
    .banner {
      display: none; margin: 12px 0; padding: 10px 12px; border-radius: 8px;
      background: rgba(210,153,34,.12); border: 1px solid var(--warn);
      color: var(--warn); font-size: 13px;
    }
    .banner.show { display: block; }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
         color: var(--muted); margin: 24px 0 10px; }
    .grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 620px) { .grid { grid-template-columns: 1fr 1fr; } }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .ticker { font-size: 18px; font-weight: 700; }
    .name { color: var(--muted); font-size: 12px; }
    .score {
      font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--accent);
    }
    .label { margin: 8px 0; font-size: 13px; color: var(--text); }
    .rows { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
            font-size: 13px; margin-top: 8px; }
    .rows .k { color: var(--muted); }
    .rows .v { text-align: right; font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block; margin-top: 10px; padding: 3px 8px; border-radius: 999px;
      font-size: 11px; letter-spacing: .3px;
      background: rgba(210,153,34,.14); color: var(--warn); border: 1px solid rgba(210,153,34,.4);
    }
    .spark { margin-top: 10px; width: 100%; height: 40px; display: block; }
    .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
    footer { color: var(--muted); font-size: 11px; text-align: center;
             padding: 24px 16px; border-top: 1px solid var(--border); margin-top: 24px; }
    .err { color: var(--short); }
    .head-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .reload {
      flex: 0 0 auto; -webkit-appearance: none; appearance: none; cursor: pointer;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600;
      min-height: 40px;  /* iOS-Tap-Target */ touch-action: manipulation;
    }
    .reload:active { background: #21262d; }
    .reload[disabled] { opacity: .5; cursor: default; }
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: var(--panel); color: var(--text); border: 1px solid var(--long);
      border-radius: 999px; padding: 8px 16px; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity .25s ease; z-index: 20;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <div class="head-row">
      <div>
        <h1>Elliott-Report</h1>
        <div class="sub" id="meta">lädt …</div>
      </div>
      <button class="reload" id="reload" type="button" aria-label="Neu laden">↻ Neu laden</button>
    </div>
  </header>
  <main>
    <div class="banner" id="staleness"></div>
    <section id="US"></section>
    <section id="DE"></section>
  </main>
  <footer>
    Heuristische Elliott-Wellen-Auszählung · unvalidiert · keine Anlageberatung.
  </footer>
  <div class="toast" id="toast"></div>

  <script>
    // WICHTIG (Pages-Pfad-Widerspruch): GitHub Pages wird aus /docs bedient,
    // Dateien AUSSERHALB /docs (z. B. das kanonische data/report.json im
    // Repo-Root) sind dort NICHT erreichbar. Deshalb spiegelt der Workflow den
    // Report nach docs/data/. Wir probieren mehrere Pfade, damit sowohl die
    // Live-Seite als auch lokale Vorschau (Server im Repo-Root) funktionieren.
    const CANDIDATE_PATHS = ['data/report.json', '../data/report.json'];
    const STALENESS_HOURS = 30;

    async function loadReport() {
      // Cache-Buster + no-store, damit iOS-Safari NICHT die alte Datei liefert
      // (kein Service Worker; der Reload muss wirklich frische Daten holen).
      const bust = '?t=' + Date.now();
      let lastErr = null;
      for (const path of CANDIDATE_PATHS) {
        try {
          const res = await fetch(path + bust, { cache: 'no-store' });
          if (res.ok) return await res.json();
          lastErr = new Error(path + ' → HTTP ' + res.status);
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('Report nicht gefunden');
    }

    function fmt(n) {
      if (n === null || n === undefined) return '–';
      return Number(n).toLocaleString('de-DE', { maximumFractionDigits: 2 });
    }

    function sparkline(points) {
      if (!points || points.length < 2) return '';
      const ys = points.map(p => p.price);
      const min = Math.min(...ys), max = Math.max(...ys), span = (max - min) || 1;
      const step = 100 / (points.length - 1);
      const coords = ys.map((y, i) =>
        `${(i * step).toFixed(2)},${(34 - ((y - min) / span) * 32).toFixed(2)}`).join(' ');
      return `<svg class="spark" viewBox="0 0 100 40" preserveAspectRatio="none">
        <polyline points="${coords}" fill="none" stroke="#58a6ff" stroke-width="1.5"/></svg>`;
    }

    function card(c) {
      const zone = c.target_zone ? `${fmt(c.target_zone.low)} – ${fmt(c.target_zone.high)}` : '–';
      const nameLine = (c.name && c.name !== c.ticker) ? `<div class="name">${c.name}</div>` : '';
      return `<article class="card">
        <div class="card-head">
          <div>
            <div class="ticker">${c.ticker}</div>
            ${nameLine}
          </div>
          <div class="score">${fmt(c.score_heuristic)}</div>
        </div>
        <div class="label">${c.count_label || ''}</div>
        <div class="rows">
          <div class="k">Kurs</div><div class="v">${fmt(c.close)}</div>
          <div class="k">Invalidierung</div><div class="v">${fmt(c.invalidation_price)}</div>
          <div class="k">Zielzone</div><div class="v">${zone}</div>
        </div>
        ${sparkline(c.chart_points)}
        <span class="badge">${c.status || 'heuristisch · unvalidiert'}</span>
      </article>`;
    }

    function renderMarket(id, market) {
      const el = document.getElementById(id);
      const cards = (market.candidates || []).map(card).join('');
      el.innerHTML = `<h2>${market.label}</h2>` +
        (cards ? `<div class="grid">${cards}</div>`
               : `<div class="empty">Keine validen Kandidaten für diesen Lauf.</div>`);
    }

    function checkStaleness(tsUtc) {
      const banner = document.getElementById('staleness');
      if (!tsUtc) return;
      const ageH = (Date.now() - new Date(tsUtc).getTime()) / 3.6e6;
      if (ageH > STALENESS_HOURS) {
        banner.textContent = `⚠️ Daten sind ${Math.round(ageH)} h alt ` +
          `(> ${STALENESS_HOURS} h) — Update ausstehend.`;
        banner.classList.add('show');
      }
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    async function refresh({ announce = false } = {}) {
      const btn = document.getElementById('reload');
      btn.disabled = true;
      const prev = btn.textContent;
      btn.textContent = '… lädt';
      try {
        const r = await loadReport();
        document.getElementById('meta').textContent =
          `Stand: ${r.run_timestamp_utc || '?'} · Schema v${r.schema_version ?? '?'}`;
        document.getElementById('staleness').classList.remove('show');
        checkStaleness(r.run_timestamp_utc);
        renderMarket('US', r.markets.US);
        renderMarket('DE', r.markets.DE);
        if (announce) showToast(`Aktualisiert · Stand ${r.run_timestamp_utc || '?'}`);
      } catch (e) {
        document.getElementById('meta').innerHTML =
          `<span class="err">Report konnte nicht geladen werden: ${e.message}</span>`;
        if (announce) showToast('Aktualisieren fehlgeschlagen');
      } finally {
        btn.textContent = prev;
        btn.disabled = false;
      }
    }

    document.getElementById('reload').addEventListener('click', () => refresh({ announce: true }));
    refresh();
  </script>
</body>
</html>
