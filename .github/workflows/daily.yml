name: Daily Elliott Report

# Läuft nach US-Börsenschluss (21:45 UTC) + manuell per Tap (workflow_dispatch).
# Committet data/report.json (+ Spiegel) UND data/forward_collection.json
# (+ Spiegel) auf main — die Forward-Sammlung MUSS persistiert werden, sonst
# resettet sie jeden Lauf und n wächst nie (siehe SESSION_HANDOVER.md).
# Fail-soft: Ein fehlerhafter Lauf committet nichts, bricht aber sichtbar ab,
# statt kaputte Daten zu veröffentlichen.

on:
  schedule:
    - cron: "45 21 * * *"   # 21:45 UTC, täglich (nach US-Close)
  workflow_dispatch: {}       # Tap-Start

# Nicht mehrere Läufe gleichzeitig auf main.
concurrency:
  group: daily-elliott
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/elliott_pipeline.py

      - name: Validate report JSON
        run: |
          python - <<'PY'
          import json, sys
          for path in ("data/report.json", "docs/data/report.json"):
              with open(path, encoding="utf-8") as fh:
                  data = json.load(fh)
              assert "markets" in data and "US" in data["markets"] and "DE" in data["markets"], path
              assert "run_timestamp_utc" in data, path
          print("report JSON valide")
          PY

      # Selbstüberwachung (bewusst fast stumm): Meilenstein n>=100 + Review-
      # Wecker. VOR dem Commit, damit die einmalige Meilenstein-Marker-Datei im
      # selben Lauf mitcommittet wird. notify.py ist total fail-soft (exit 0).
      - name: Self-monitor push (Meilenstein + Review-Wecker)
        if: success()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/notify.py --mode daily

      - name: Commit report + collection if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Report UND Forward-Sammlung persistieren (sonst wächst n nie).
          git add data/report.json docs/data/report.json \
                  data/forward_collection.json docs/data/forward_collection.json
          # Einmaliger Meilenstein-Marker (falls in diesem Lauf gesetzt).
          [ -f data/validation_milestone_fired.flag ] \
            && git add data/validation_milestone_fired.flag || true
          if git diff --cached --quiet; then
            echo "Keine Änderungen — nichts zu committen."
          else
            git commit -m "chore(data): täglicher Elliott-Report + Sammlung [skip ci]"
            # Race-Härtung: falls main während des Laufs wanderte (z. B. ein
            # Feature-PR gemergt), unseren Daten-Commit darauf rebasen und
            # pushen. Datenfiles kollidieren praktisch nie (nur dieser Job
            # schreibt sie; Läufe sind per concurrency serialisiert). Bei
            # echtem Konflikt bricht der Rebase ab -> Lauf schlägt sichtbar
            # fehl (fail-soft: kein Teil-Push).
            pushed=""
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed="yes"; break
              fi
              echo "Push-Versuch $i fehlgeschlagen — neuer Versuch."
              sleep $((i * 3))
            done
            if [ -z "$pushed" ]; then
              echo "::error::Daten-Push nach 3 Versuchen fehlgeschlagen."
              exit 1
            fi
          fi

      # Lauf-Fehlschlag → EIN Push. Bewusst inline (curl), damit ein gebrochener
      # Python-/Pip-Schritt den Alarm nicht mitreißt. Fail-soft: leeres Topic
      # oder curl-Fehler ändern den (bereits roten) Job-Status nicht.
      - name: Push bei Lauf-Fehlschlag
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "kein NTFY_TOPIC → kein Push (graceful)."; exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -m 10 \
            -H "Title: Elliott-Lauf fehlgeschlagen" \
            -H "Priority: high" -H "Tags: rotating_light" \
            -d "Elliott-Lauf fehlgeschlagen · $(date -u +%Y-%m-%d) · ${RUN_URL}" \
            "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy-Push fehlgeschlagen (fail-soft)"
          exit 0
