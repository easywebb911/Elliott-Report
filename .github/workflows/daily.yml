name: Daily Elliott Report

# Läuft nach US-Börsenschluss (21:45 UTC) + manuell per Tap (workflow_dispatch).
# Committet data/report.json (+ Spiegel docs/data/report.json) auf main.
# Fail-soft: Ein fehlerhafter Lauf committet nichts, bricht aber sichtbar ab,
# statt kaputte Daten zu veröffentlichen.

on:
  schedule:
    - cron: "45 21 * * *"   # 21:45 UTC, täglich (nach US-Close)
  workflow_dispatch: {}       # Tap-Start

# Nicht mehrere Läufe gleichzeitig auf main.
concurrency:
  group: daily-elliott
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/elliott_pipeline.py

      - name: Validate report JSON
        run: |
          python - <<'PY'
          import json, sys
          for path in ("data/report.json", "docs/data/report.json"):
              with open(path, encoding="utf-8") as fh:
                  data = json.load(fh)
              assert "markets" in data and "US" in data["markets"] and "DE" in data["markets"], path
              assert "run_timestamp_utc" in data, path
          print("report JSON valide")
          PY

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json docs/data/report.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen am Report — nichts zu committen."
          else
            git commit -m "chore(data): täglicher Elliott-Report [skip ci]"
            git push
          fi
