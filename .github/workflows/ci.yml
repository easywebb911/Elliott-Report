name: CI

# Grüner Haken je PR + bei Push auf main. Führt die Offline-Tests aus —
# KEIN Netz-/yfinance-Zugriff nötig (Tests nutzen synthetische Daten).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Ältere Läufe je Ref abbrechen, wenn neu gepusht wird.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip  # pip-Cache über requirements.txt -> schnelle Re-Runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (offline)
        run: python -m pytest -q
